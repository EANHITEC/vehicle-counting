name: .NET Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore VehicleCountingONNX.csproj

      - name: Build
        run: dotnet build VehicleCountingONNX.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish VehicleCountingONNX.csproj --configuration Release --no-build --output ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vehiclecounting-publish
          path: ./publish
